name: Build CV PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: CV.tex
          working_directory: Alastair_2026_CV
          
      - name: Move PDF to root
        run: mv Alastair_2026_CV/CV.pdf Alastair_Price_CV.pdf
          
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: Alastair_Price_CV.pdf
          
      - name: Commit PDF to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Alastair_Price_CV.pdf
          git diff --cached --quiet || git commit -m "Auto-build CV PDF"
          git push
